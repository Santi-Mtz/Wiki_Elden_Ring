version: "3.9"

services:
  db:
    image: postgres:17-alpine
    container_name: aegis-db
    restart: unless-stopped
    env_file:
      - ./deploy/.env.production
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - db_data:/var/lib/postgresql/data
    networks:
      - aegis-net

  api:
    build:
      context: ./mi-servidor
    container_name: aegis-api
    restart: unless-stopped
    env_file:
      - ./deploy/.env.production
    environment:
      PORT: 3000
      DB_HOST: db
      DB_PORT: 5432
      DB_NAME: ${POSTGRES_DB}
      DB_USER: ${POSTGRES_USER}
      DB_PASSWORD: ${POSTGRES_PASSWORD}
      ADMIN_EMAIL: ${ADMIN_EMAIL}
    depends_on:
      - db
    networks:
      - aegis-net

  nginx:
    image: nginx:1.27-alpine
    container_name: aegis-nginx
    restart: unless-stopped
    depends_on:
      - api
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./deploy/nginx/app.conf:/etc/nginx/conf.d/default.conf:ro
      - ./frontend/dist/frontend/browser:/usr/share/nginx/html:ro
      - certbot_www:/var/www/certbot
      - certbot_conf:/etc/letsencrypt
    networks:
      - aegis-net

  certbot:
    image: certbot/certbot:latest
    container_name: aegis-certbot
    profiles:
      - tools
    volumes:
      - certbot_www:/var/www/certbot
      - certbot_conf:/etc/letsencrypt

volumes:
  db_data:
  certbot_www:
  certbot_conf:

networks:
  aegis-net:
